---
- name: CLI | Software | rtx | Install Python dependencies
  ansible.builtin.apt:
    state: latest
    cache_valid_time: 86400 # 1 day
    update_cache: yes
    pkg:
      - libbz2-dev
      - libffi-dev
      - liblzma-dev
      - libncursesw5-dev
      - libreadline-dev
      - libsqlite3-dev
      - libssl-dev
      - libxml2-dev
      - libxmlsec1-dev
      - llvm
      - tk-dev
      - xz-utils
      - zlib1g-dev

- name: CLI | Software | rtx | Add GPG Key
  ansible.builtin.apt_key:
    url: https://rtx.pub/gpg-key.pub
    state: present

- name: CLI | Software | rtx | Add Docker Repo
  ansible.builtin.apt_repository:
    repo: deb https://rtx.pub/deb stable main
    state: present

- name: CLI | Software | rtx | Install
  ansible.builtin.apt:
    state: latest
    update_cache: yes
    pkg:
      - rtx
