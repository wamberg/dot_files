- hosts: localhost
  tasks:
    - name: Packages | Tap tinted-theming
      community.general.homebrew_tap:
        name: tinted-theming/tinted
        state: present

    - name: Packages | Tap PeonPing
      community.general.homebrew_tap:
        name: PeonPing/tap
        state: present

    - name: Packages | Install Homebrew formulae
      community.general.homebrew:
        name:
          - awscli
          - aws-vault
          - bat
          - curl
          - fd
          - fzf
          - gh
          - git
          - git-delta
          - gnupg
          - jq
          - less
          - mise
          - ncdu
          - neovim
          - pass
          - peon-ping
          - pigz
          - ripgrep
          - rsync
          - sqlite
          - starship
          - stow
          - tinty
          - tmux
          - tz
          - tree
          - unzip
          - vifm
          - vim
          - wget
          - zsh
        state: present

    - name: Packages | Install Homebrew casks
      community.general.homebrew_cask:
        name:
          - 1password
          - 1password-cli
          - claude
          - kitty
        state: present

    - name: Setup | Create directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode | default('0755') }}"
      loop:
        - { path: "{{ ansible_facts['env']['HOME'] }}/.ssh", mode: "0700" }
        - { path: "{{ ansible_facts['env']['HOME'] }}/.tmux/plugins" }
        - { path: "{{ ansible_facts['env']['HOME'] }}/.config/tinted-theming" }
        - { path: "{{ ansible_facts['env']['HOME'] }}/dev" }
        - { path: "{{ ansible_facts['env']['HOME'] }}/docs" }
        - { path: "{{ ansible_facts['env']['HOME'] }}/pics" }
        - { path: "{{ ansible_facts['env']['HOME'] }}/videos" }

    - name: Setup | Check for oh-my-zsh
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"
      register: omz_stat

    - name: Setup | Install oh-my-zsh
      when: not omz_stat.stat.exists
      ansible.builtin.shell:
        cmd: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
        creates: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"

    - name: Setup | Remove oh-my-zsh default .zshrc
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
        state: absent
      when: not omz_stat.stat.exists

    - name: Setup | Stow dotfiles
      ansible.builtin.shell: >
        stow --dir="{{ ansible_facts['env']['HOME'] }}/dev/dot_files"
        --target="{{ ansible_facts['env']['HOME'] }}/"
        --restow --no-folding --verbose=1
        {{ item }}
      loop:
        - bat
        - bin
        - git
        - kitty
        - mise
        - npm
        - nvim
        - sql
        - tinty
        - tmux
        - tz
        - vifm
        - zsh
      register: stow_result
      changed_when: stow_result.stderr != ""

    - name: Setup | Stat Claude Desktop config (clobbered by the app on launch)
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/Claude/claude_desktop_config.json"
      register: claude_desktop_config_stat

    - name: Setup | Remove non-symlink Claude Desktop config so stow can re-link
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/Claude/claude_desktop_config.json"
        state: absent
      when:
        - claude_desktop_config_stat.stat.exists
        - not claude_desktop_config_stat.stat.islnk

    - name: Setup | Stow claude-desktop to $HOME
      ansible.builtin.shell: >
        stow --dir="{{ ansible_facts['env']['HOME'] }}/dev/dot_files"
        --target="{{ ansible_facts['env']['HOME'] }}/"
        --restow --no-folding --verbose=1
        claude-desktop
      register: stow_claude_desktop
      changed_when: stow_claude_desktop.stderr != ""

    - name: Setup | Stow claude-code-cli user-home subtree
      ansible.builtin.shell: >
        stow --dir="{{ ansible_facts['env']['HOME'] }}/dev/dot_files"
        --target="{{ ansible_facts['env']['HOME'] }}/"
        --restow --no-folding --verbose=1
        --ignore="etc" --ignore="profiles"
        claude-code-cli
      register: stow_claude_code_cli_user
      changed_when: stow_claude_code_cli_user.stderr != ""

    - name: Setup | Create managed settings directory for Claude Code
      ansible.builtin.command:
        cmd: sudo mkdir -p '/Library/Application Support/ClaudeCode'
        creates: /Library/Application Support/ClaudeCode

    - name: Setup | Symlink Claude Code managed settings
      ansible.builtin.shell: >
        sudo ln -sf
        '{{ ansible_facts["env"]["HOME"] }}/dev/dot_files/claude-code-cli/etc/claude-code/managed-settings.json'
        '/Library/Application Support/ClaudeCode/managed-settings.json'
      register: claude_symlink
      changed_when: claude_symlink.rc == 0

    - name: Setup | Run peon-ping-setup
      ansible.builtin.command:
        cmd: peon-ping-setup
        creates: "{{ ansible_facts['env']['HOME'] }}/.claude/hooks/peon-ping"

    - name: Setup | Check if tpm is installed
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.tmux/plugins/tpm/.git"
      register: tpm_stat

    - name: Setup | Clone tmux plugin manager
      ansible.builtin.git:
        repo: "https://github.com/tmux-plugins/tpm"
        dest: "{{ ansible_facts['env']['HOME'] }}/.tmux/plugins/tpm"
        depth: 1
      when: not tpm_stat.stat.exists

    - name: Setup | Configure 1Password SSH agent
      ansible.builtin.blockinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.ssh/config"
        create: yes
        mode: "0600"
        block: |
          Host *
              IdentityAgent "~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"

    - name: Setup | Create tinty symlink for tinted-theming path
      ansible.builtin.file:
        src: "{{ ansible_facts['env']['HOME'] }}/.config/tinty"
        dest: "{{ ansible_facts['env']['HOME'] }}/.config/tinted-theming/tinty"
        state: link
        force: no
      ignore_errors: yes

    - name: Setup | Check for missing mise tools
      ansible.builtin.shell: mise ls --missing
      register: mise_missing
      changed_when: false

    - name: Setup | Install mise tools
      ansible.builtin.shell: mise install
      when: mise_missing.stdout != ""
